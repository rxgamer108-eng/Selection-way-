workflows:
  cordova-android:
    name: SelectionWay Android APK
    max_build_duration: 60
    environment:
      node: 18.17.0
      java: 17
      android_signing:
        - keystore_reference
      groups:
        - android_credentials
    scripts:
      - name: Install Cordova
        script: npm install -g cordova@12

      - name: Install dependencies
        script: npm install

      - name: Add Android platform
        script: cordova platform add android@12.0.1

      - name: Install plugins
        script: |
          cordova plugin add cordova-plugin-file
          cordova plugin add cordova-plugin-file-transfer
          cordova plugin add cordova-plugin-android-permissions
          cordova plugin add cordova-plugin-inappbrowser
          cordova plugin add cordova-plugin-device

      - name: Set build tools version
        script: |
          cd platforms/android
          sed -i "s/33.0.0/33.0.2/g" app/build.gradle || true

      - name: Build APK
        script: |
          export ANDROID_BUILD_TOOLS_VERSION=33.0.2
          cordova build android --debug

    artifacts:
      - platforms/android/app/build/outputs/apk/debug/app-debug.apk
